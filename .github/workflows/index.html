<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lan_Tian</title>
  <style>
    :root {
      --primary: #8b8bff;
      --secondary: #ff9bd6;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(
        120deg,
        #0f1020,
        #1b1d3a,
        #241f52,
        #1b1d3a,
        #0f1020
      );
      background-size: 300% 300%;
      animation: flow 8s linear infinite;
      display: flex;
      flex-direction: column;
    }

    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(139,139,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(255,155,214,0.22), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(110,231,255,0.18), transparent 40%);
      animation: lightMove 9s linear infinite;
      pointer-events: none;
    }

    @keyframes lightMove {
      0% { transform: translate(0,0); }
      50% { transform: translate(30px,-40px); }
      100% { transform: translate(0,0); }
    }

    .overlay {
      flex: 1;
      background: linear-gradient(
        to bottom,
        rgba(15,16,32,0.55),
        rgba(15,16,32,0.75)
      );
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      letter-spacing: 3px;
      margin-bottom: 28px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 18px rgba(140,140,255,0.35);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 26px 12px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .link-item img {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      z-index: 1;
    }

    .link-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 26px rgba(0,0,0,0.35);
    }

    @keyframes glow {
      0% { opacity: 0.3; transform: scale(0.9); }
      50% { opacity: 0.8; transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(0.9); }
    }

    .link-item::before {
      content: "";
      position: absolute;
      left: -18px;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translateY(-50%);
      filter: blur(6px);
      animation: glow 2.6s ease-in-out infinite;
    }

    .link-item.bili::before { background: #00a1d6; }
    .link-item.bili:hover {
      background: linear-gradient(90deg, #00a1d6, #66d9ff);
      border-color: transparent;
    }

    .link-item.github::before { background: #8b949e; }
    .link-item.github:hover {
      background: linear-gradient(90deg, #8b949e, #c9d1d9);
      border-color: transparent;
    }

    footer {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--muted);
      background: rgba(15,16,32,0.6);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Lan_Tian</h1>
    <div class="links">
      <a class="link-item bili" href="https://space.bilibili.com/351947529" target="_blank" rel="noopener">
        <img src="https://www.bilibili.com/favicon.ico" alt="Bilibili" />
        <span>Bilibili · 蓝天Lan_Tian</span>
      </a>
      <a class="link-item github" href="https://github.com/BiliLanTian" target="_blank" rel="noopener">
        <img src="https://github.com/favicon.ico" alt="GitHub" />
        <span>GitHub · BiliLanTian</span>
      </a>
    </div>
  </div>
  <footer>
    </a>
  </footer>
</body>
</html>
